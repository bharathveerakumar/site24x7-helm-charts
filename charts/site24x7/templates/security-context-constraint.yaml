{{- if and .Values.openShift (not .Values.site24x7Agent.applyNonRootSecurityContext) }}
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities:
- NET_BIND_SERVICE
apiVersion: security.openshift.io/v1
defaultAddCapabilities: null
fsGroup:
  type: MustRunAs
kind: SecurityContextConstraints
metadata:
  name: {{ include "site24x7.fullname" . }}
  annotations:
    # This tells Helm to run this BEFORE the rest of the chart
    "helm.sh/hook": pre-install,pre-upgrade
priority: null
readOnlyRootFilesystem: false
seccompProfiles:
- '*'
requiredDropCapabilities: []
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
  seLinuxOptions:
    user: "system_u"
    role: "system_r"
    type: "spc_t"
    level: "s0"
supplementalGroups:
  type: RunAsAny
users:
- system:serviceaccount:{{ .Release.Namespace }}:{{ include "site24x7.serviceAccountName" . }}
- system:serviceaccount:{{ .Release.Namespace }}:{{ include "site24x7KubeStateMetrics.name" . }}
volumes:
- configMap
- csi
- downwardAPI
- emptyDir
- ephemeral
- persistentVolumeClaim
- projected
- secret
- hostPath
{{- end }}